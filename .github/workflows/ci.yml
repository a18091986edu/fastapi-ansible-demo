name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:

      # 🔹 13. Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Debug key
        run: |
          ls -la ~/.ssh
          head -n 10 ~/.ssh/id_rsa
      
      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ secrets.HOST }} "echo SSH OK"

      # 🔹 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔹 2. Build test image
      - name: Build test image
        run: docker build -t fastapi_app:test .

      # 🔹 3. Create .env
      - name: Create .env
        run: |
          echo "POSTGRES_USER=user" >> .env
          echo "POSTGRES_PASSWORD=password" >> .env
          echo "POSTGRES_DB=mydb" >> .env

      # 🔹 4. Override compose
      - name: Create docker-compose.ci.yml
        run: |
          cat <<EOF > docker-compose.ci.yml
          services:
            app:
              image: fastapi_app:test
          EOF

      # 🔹 5. Start services
      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      # 🔹 6. Wait for API
      - name: Wait for API
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8001 > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 3
          done
          docker compose logs
          exit 1

      # 🔹 7. Test API
      - name: Test API
        run: curl --fail http://localhost:8001

      # 🔹 8. Cleanup
      - name: Cleanup
        if: always()
        run: docker compose down -v

      # 🔹 9. Login DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      # 🔹 10. Build production image
      - name: Build production image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/fastapi_app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USER }}/fastapi_app:${{ github.sha }} ${{ secrets.DOCKER_USER }}/fastapi_app:latest

      # 🔹 11. Push images
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USER }}/fastapi_app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USER }}/fastapi_app:latest

      # 🔹 12. Install Ansible
      - name: Install Ansible
        run: |
          python3 -m venv ansible-venv
          source ansible-venv/bin/activate
          pip install ansible



      # 🔹 14. Deploy via Ansible
      - name: Deploy
        run: |
          source ansible-venv/bin/activate
          ansible-playbook -i deploy/inventory.ini deploy/deploy.yml \
            --private-key ~/.ssh/id_rsa