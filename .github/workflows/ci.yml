name: CI Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Build image
    run: docker build -t fastapi-app .

  - name: Run container
    run: docker run -d -p 8001:8001 --name fastapi_app fastapi-app

  - name: Show containers
    run: docker ps

  - name: Show logs
    run: docker logs fastapi_app
```
