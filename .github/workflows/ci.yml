name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build
      - name: Wait for services
        run: sleep 10

      - name: Test API
        run: curl --fail http://localhost:8001

      - name: Show containers
        run: docker ps

      - name: Show logs on failure
        if: failure()
        run: docker logs fastapi_app

      - name: Cleanup
        if: always()
        run: docker stop fastapi_app && docker rm fastapi_app