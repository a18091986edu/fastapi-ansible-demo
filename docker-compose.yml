version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5555:5432"

  app:
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - db